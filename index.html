<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Republic Economy Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6">
    <div class="flex items-center justify-between gap-4">
      <h1 class="text-3xl font-bold">Republic Economy Tracker</h1>
      <a href="submit.html" class="text-sm text-blue-600 underline">Submit a Project</a>
    </div>

    <div id="status" class="mt-4 text-sm text-gray-600"></div>

    <div id="projects" class="grid gap-4 mt-6 sm:grid-cols-2"></div>
  </div>

  <script>
    // Your Supabase credentials (Publishable key = old "anon" key)
    const SUPABASE_URL = "https://ozafpxboemvvkotwgxoy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_h-9NYJmjFh8oeMmlK6kPhA_L5zQZRKT";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const container = document.getElementById("projects");

    function escapeHtml(str = "") {
      return String(str).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    function renderProjectCard(p) {
      const website = p.website ? `<a class="text-sm underline" target="_blank" rel="noreferrer" href="${p.website}">Website</a>` : "";
      const github  = p.github  ? `<a class="text-sm underline" target="_blank" rel="noreferrer" href="${p.github}">GitHub</a>` : "";
      const twitter = p.twitter ? `<a class="text-sm underline" target="_blank" rel="noreferrer" href="${p.twitter}">Twitter/X</a>` : "";
      const discord = p.discord ? `<a class="text-sm underline" target="_blank" rel="noreferrer" href="${p.discord}">Discord</a>` : "";

      const links = [website, github, twitter, discord].filter(Boolean).join(" · ");

      return `
        <div class="bg-white p-4 rounded-xl border">
          <div class="text-xs text-gray-500">${escapeHtml(p.category || "")}</div>
          <h2 class="font-semibold text-lg mt-1">${escapeHtml(p.name || "")}</h2>
          <p class="text-sm text-gray-600 mt-1">${escapeHtml(p.short_description || "")}</p>
          ${links ? `<div class="mt-3 text-sm text-gray-700">${links}</div>` : ""}
        </div>
      `;
    }

    async function loadProjects() {
      statusEl.textContent = "Loading approved projects...";
      container.innerHTML = "";

      const { data, error } = await client
        .from("projects")
        .select("name,short_description,category,website,github,twitter,discord,status,created_at")
        .order("created_at", { ascending: false });

      // Debug info in console (helpful)
      console.log("Supabase data:", data);
      console.log("Supabase error:", error);

      if (error) {
        statusEl.textContent = "Error loading projects.";
        container.innerHTML = `<pre class="text-xs text-red-600 whitespace-pre-wrap">${escapeHtml(error.message)}</pre>`;
        return;
      }

      const rows = data || [];

      if (rows.length === 0) {
        statusEl.textContent = "No approved projects yet.";
        container.innerHTML = `
          <div class="text-sm text-gray-500">
            Nothing to show right now. This usually means:
            <ul class="list-disc ml-5 mt-2">
              <li>You haven't approved any projects yet (status must be <b>approved</b>).</li>
              <li>RLS policy is set to only show approved rows.</li>
            </ul>
          </div>
        `;
        return;
      }

      statusEl.textContent = `Showing ${rows.length} approved projects`;
      container.innerHTML = rows.map(renderProjectCard).join("");
    }

    loadProjects();
  </script>
</body>
</html>
